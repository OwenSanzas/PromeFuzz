# PromeFuzz config override for this experiment.
#
# Source of truth for PromeFuzz settings that differ from its shipped defaults.
# Copy or symlink this file to baselines/PromeFuzz/experiment_config.toml
# (which is what promefuzz_adapter.py passes via `--config`). The path inside
# baselines/PromeFuzz is gitignored along with the rest of the baselines repo.
#
# What we override, and why:
#   - generation_rounds      -> 5  (uniform REBUILD_ATTEMPTS across all tools)
#   - sanitization_rounds    -> 5  (uniform REBUILD_ATTEMPTS across all tools)
#   - llm.cloud_llm.base_url -> LiteLLM proxy on localhost:4000
#   - llm.cloud_llm.model    -> claude-sonnet-4-6
#   - llm.embedding_llm      -> OpenAI text-embedding-3-small via same proxy
#
# Everything else stays at the upstream template default.

[preprocessor]
run_dummydriver_test = false
dump_relevance_as_csv = false
dump_call_graph = false

[comprehender]
embedding_llm = "embedding_llm"
comprehension_llm = ""
retrieve_top_k = 3
function_batch_size = 24

[generator]
generation_llm = ""
collect_depth = 3
collect_one_def_in_same_names = true
function_set_size = 6
use_consumer_case_count = 50

# Uniform REBUILD_ATTEMPTS = 5 (matches experiment_config.REBUILD_ATTEMPTS)
generation_rounds = 5
sanitization_rounds = 5

function_fail_limit = 5
function_fail_if_driver_fail = 1.0
function_fail_if_driver_miss = 0.5
stagnation_limit = -1

[analyzer]
analysis_llm = ""

[llm]
default_llm = "cloud_llm"
validate_llm = false
enable_log = true

# ── cloud_llm: claude-sonnet-4-6 via LiteLLM proxy ─────────────────────────
[llm.cloud_llm]
llm_type = "openai"
base_url = "http://localhost:4000/v1/"
# PromeFuzz reads api_key from the env var OPENAI_API_KEY when unset here.
# start_proxy.sh exports OPENAI_API_KEY=sk-local-promefuzz-run for us.
api_key = ""
model = "claude-sonnet-4-6"
temperature = 0.5
max_tokens = -1
timeout = 120
retry_times = 3

# ── embedding_llm: OpenAI text-embedding-3-small via LiteLLM ───────────────
[llm.embedding_llm]
llm_type = "openai"
base_url = "http://localhost:4000/v1/"
api_key = ""
model = "text-embedding-3-small"
max_tokens = -1
timeout = 60
retry_times = 3

[bin]
preprocessor = "{PROMEFUZZ_PATH}/build/bin/preprocessor"
cgprocessor = "{PROMEFUZZ_PATH}/build/bin/cgprocessor"
