# LiteLLM proxy config for the PromeFuzz run.
#
# Purpose:
#   All four tools (Gold / AGF / OFG / PromeFuzz) should hit the same LLM
#   backend so the comparison measures tool pipeline quality, not LLM
#   capability. LiteLLM gives us a single OpenAI-compatible endpoint
#   (http://localhost:4000) that any tool can talk to via the standard
#   /v1/chat/completions path; we route that transparently to Claude
#   Sonnet 4.6 on Anthropic's API.
#
# Start the proxy with:
#   ./start_proxy.sh
#
# Tools then connect with:
#   base_url = http://localhost:4000
#   api_key  = sk-local-promefuzz-run  (set as LLM_PROXY_MASTER_KEY)
#   model    = claude-sonnet-4-6

model_list:
  # Primary generation model — used by PromeFuzz / AGF / OFG for harness
  # synthesis, comprehension and any tool-call steps.
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
      temperature: 0.5
      max_tokens: 4096

  # Alias so tools that default to gpt-4o silently map to Claude without
  # per-tool config edits. PromeFuzz's template toml sets `model = "gpt-4o"`
  # by default; leaving this alias in place means we only need to change
  # base_url in that toml, not the model name.
  - model_name: gpt-4o
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
      temperature: 0.5
      max_tokens: 4096

  # Embedding model — PromeFuzz uses this for its knowledge-base RAG. Claude
  # does not expose an embedding endpoint, so we use OpenAI's small embedding
  # model via its native provider. This requires OPENAI_API_KEY.
  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

general_settings:
  master_key: sk-local-promefuzz-run
  # No database — this is an in-process proxy, not a persistent one.

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
